name: DesertTycoon
options:
  minimumXcodeGenVersion: "2.41.0"
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: ar
settings:
  base:
    SWIFT_VERSION: "5"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.2.0"
    CURRENT_PROJECT_VERSION: "1821"
    CODE_SIGN_STYLE: Automatic
    SDKROOT: iphoneos
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    SUPPORTS_MACCATALYST: NO

targets:
  DesertTycoon:
    type: application
    platform: iOS
    sources:
      - path: App
    resources:
      - path: Resources/LegacyAssets
        type: folder
        buildPhase: resources
      - path: Resources/preview_camel.png
      - path: Resources/preview_counter.png
      - path: Resources/preview_phase1_map.png
      - path: Resources/preview_phase2_map.png
      - path: Resources/preview_phase3_map.png
      - path: Resources/preview_souk_bg.jpg
      - path: Resources/preview_splash_arabic.jpg
      - path: Resources/preview_splash_english.jpg
      - path: App/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ba.lum.deserttycoon
        PRODUCT_NAME: DesertTycoon
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
